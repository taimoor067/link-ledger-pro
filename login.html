<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Link Building Suite</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0b0d12;
    --bg-2: #0f1115;
    --panel: rgba(22, 25, 34, 0.65);
    --panel-solid: #161922;
    --panel-2: #1c2029;
    --border: #2a2f3a;
    --border-soft: rgba(255,255,255,0.06);
    --text: #e6e8eb;
    --text-dim: #9aa1ad;
    --text-faint: #686f7b;
    --accent: #4f8cff;
    --accent-2: #7da6ff;
    --accent-dim: #2c4a85;
    --good: #3ecf8e;
    --warn: #e0a23b;
    --bad: #e0563b;
    --radius: 14px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    position: relative;
    overflow-x: hidden;
  }

  /* ---------- Ambient background ---------- */
  .bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background: var(--bg);
  }

  .bg-glow {
    position: absolute;
    border-radius: 50%;
    opacity: 0.3;
    will-change: transform;
    transform: translateZ(0);
    background-repeat: no-repeat;
  }

  .bg-glow.one {
    width: 520px;
    height: 520px;
    top: -200px;
    left: -180px;
    background: radial-gradient(circle, var(--accent) 0%, rgba(79,140,255,0) 70%);
    animation: driftOne 26s ease-in-out infinite;
  }

  .bg-glow.two {
    width: 480px;
    height: 480px;
    bottom: -220px;
    right: -180px;
    background: radial-gradient(circle, #6f5cff 0%, rgba(111,92,255,0) 70%);
    animation: driftTwo 30s ease-in-out infinite;
  }

  .bg-glow.three {
    display: none;
  }

  @keyframes driftOne {
    0%, 100% { transform: translate3d(0, 0, 0); }
    50% { transform: translate3d(50px, 30px, 0); }
  }
  @keyframes driftTwo {
    0%, 100% { transform: translate3d(0, 0, 0); }
    50% { transform: translate3d(-40px, -25px, 0); }
  }

  .bg-grain { display: none; }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }

  .auth-wrap {
    width: 100%;
    max-width: 380px;
    position: relative;
    z-index: 1;
    animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  /* ---------- Owl mascot ---------- */
  .owl-stage {
    display: flex;
    justify-content: center;
    margin-bottom: 6px;
  }

  .owl-stage svg {
    width: 86px;
    height: 86px;
    overflow: visible;
  }

  .owl-eye {
    transform-origin: center;
    transition: transform 0.18s ease;
  }

  .owl-pupil {
    transition: transform 0.15s ease;
  }

  .owl-lid {
    transform-origin: center;
    transition: transform 0.16s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .brand {
    text-align: center;
    margin-bottom: 22px;
  }

  .brand h1 {
    font-size: 18px;
    margin: 0 0 4px 0;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .brand p {
    color: var(--text-dim);
    font-size: 12.5px;
    margin: 0;
  }

  .panel {
    background: linear-gradient(180deg, rgba(28,32,42,0.94), rgba(20,23,31,0.94));
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 26px 24px;
    position: relative;
    isolation: isolate;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.04) inset,
      0 20px 40px -16px rgba(0,0,0,0.5);
  }

  .panel::before {
    content: "";
    position: absolute;
    inset: -1px;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(135deg, rgba(79,140,255,0.35), rgba(255,255,255,0) 40%, rgba(79,140,255,0.12) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
    opacity: 0.7;
  }

  .mode-toggle {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border-soft);
    border-radius: 9px;
    padding: 3px;
    position: relative;
  }

  .mode-toggle button {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-dim);
    padding: 8px 10px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    position: relative;
    z-index: 1;
    transition: color 0.2s ease;
  }

  .mode-toggle button.active {
    color: #fff;
  }

  .mode-toggle .toggle-pill {
    position: absolute;
    top: 3px;
    left: 3px;
    width: calc(50% - 3px);
    height: calc(100% - 6px);
    background: var(--accent);
    border-radius: 7px;
    transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 14px -4px rgba(79,140,255,0.6);
  }

  .mode-toggle.signup .toggle-pill {
    transform: translateX(100%);
  }

  form { position: relative; }

  .form-view {
    transition: opacity 0.2s ease, transform 0.2s ease;
  }

  .form-view.leaving {
    opacity: 0;
    transform: translateY(-4px);
  }

  /* ---------- Floating label fields ---------- */
  .field {
    position: relative;
    margin-bottom: 16px;
  }

  .field input {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 16px 14px 8px 14px;
    border-radius: 8px;
    font-size: 14px;
    width: 100%;
    transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
  }

  .field input::placeholder { color: transparent; }

  .field label {
    position: absolute;
    left: 14px;
    top: 14px;
    font-size: 13.5px;
    color: var(--text-faint);
    pointer-events: none;
    transform-origin: left top;
    transition: transform 0.16s ease, color 0.16s ease, top 0.16s ease;
  }

  .field input:focus + label,
  .field input:not(:placeholder-shown) + label {
    top: 6px;
    transform: scale(0.78);
    color: var(--text-dim);
  }

  .field input:focus {
    outline: none;
    border-color: var(--accent);
    background: #1d2129;
    box-shadow: 0 0 0 3px rgba(79,140,255,0.14);
  }

  .field input.invalid {
    border-color: var(--bad);
  }

  .field input.valid {
    border-color: var(--good);
  }

  .field-hint {
    margin-top: 5px;
    font-size: 11.5px;
    color: var(--text-faint);
    min-height: 14px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .field-hint.warn { color: var(--warn); }
  .field-hint.error { color: var(--bad); }

  .password-wrap { position: relative; }

  .pw-toggle-btn {
    position: absolute;
    right: 10px;
    top: 13px;
    background: transparent;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color 0.15s ease;
  }

  .pw-toggle-btn:hover { color: var(--text-dim); }
  .pw-toggle-btn svg { width: 17px; height: 17px; }

  .password-wrap input { padding-right: 40px; }

  /* Strength meter */
  .strength-row {
    display: flex;
    gap: 4px;
    margin-top: 8px;
    height: 4px;
  }

  .strength-row .bar {
    flex: 1;
    border-radius: 3px;
    background: var(--border);
    transition: background 0.2s ease;
  }

  .strength-label {
    margin-top: 5px;
    font-size: 11px;
    color: var(--text-faint);
  }

  .caps-warning {
    display: none;
    align-items: center;
    gap: 5px;
    margin-top: 6px;
    font-size: 11.5px;
    color: var(--warn);
  }

  .caps-warning.show { display: flex; }

  .forgot-row {
    display: flex;
    justify-content: flex-end;
    margin: -6px 0 14px;
  }

  .forgot-row button {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    padding: 2px 0;
    transition: color 0.15s ease;
  }

  .forgot-row button:hover { color: var(--accent-2); }

  /* ---------- Button ---------- */
  button.primary-action {
    width: 100%;
    cursor: pointer;
    border: none;
    background: linear-gradient(135deg, var(--accent), #6f5cff);
    color: #fff;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    position: relative;
    overflow: hidden;
    transition: transform 0.12s ease, box-shadow 0.2s ease, opacity 0.15s ease;
    margin-top: 4px;
    box-shadow: 0 8px 24px -8px rgba(79,140,255,0.55);
  }

  button.primary-action:hover { box-shadow: 0 10px 28px -6px rgba(79,140,255,0.7); }
  button.primary-action:active { transform: scale(0.985); }
  button.primary-action:disabled { opacity: 0.75; cursor: default; }

  .btn-label, .btn-spinner, .btn-check {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-spinner, .btn-check { display: none; }

  button.primary-action.loading .btn-label { display: none; }
  button.primary-action.loading .btn-spinner { display: inline-flex; }

  button.primary-action.success .btn-label,
  button.primary-action.success .btn-spinner { display: none; }
  button.primary-action.success .btn-check { display: inline-flex; }
  button.primary-action.success { background: linear-gradient(135deg, var(--good), #2fae78); box-shadow: 0 8px 24px -8px rgba(62,207,142,0.55); }

  .spinner-ring {
    width: 15px;
    height: 15px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .status-msg {
    margin-top: 14px;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 12.5px;
    display: none;
    animation: fadeIn 0.2s ease both;
  }

  .status-msg.show { display: block; }

  .status-msg.error {
    background: rgba(224, 86, 59, 0.1);
    border: 1px solid var(--bad);
    color: var(--bad);
  }

  .status-msg.success {
    background: rgba(62, 207, 142, 0.1);
    border: 1px solid var(--good);
    color: var(--good);
  }

  .footer-note {
    text-align: center;
    margin-top: 18px;
    color: var(--text-faint);
    font-size: 11.5px;
    padding: 0 8px;
  }

  .hidden { display: none !important; }

  @media (max-width: 420px) {
    .panel { padding: 22px 18px; }
    .owl-stage svg { width: 74px; height: 74px; }
  }
</style>
</head>
<body>

<div class="bg-canvas" aria-hidden="true">
  <div class="bg-glow one"></div>
  <div class="bg-glow two"></div>
  <div class="bg-glow three"></div>
  <div class="bg-grain"></div>
</div>

<div class="auth-wrap">

  <div class="owl-stage" aria-hidden="true">
    <svg viewBox="0 0 120 120" id="owlSvg">
      <!-- body -->
      <ellipse cx="60" cy="72" rx="40" ry="36" fill="#1c2029" stroke="#2a2f3a" stroke-width="1.5"/>
      <!-- ear tufts -->
      <path d="M28 38 L36 16 L46 36 Z" fill="#1c2029" stroke="#2a2f3a" stroke-width="1.5"/>
      <path d="M92 38 L84 16 L74 36 Z" fill="#1c2029" stroke="#2a2f3a" stroke-width="1.5"/>
      <!-- belly pattern -->
      <ellipse cx="60" cy="84" rx="22" ry="18" fill="#22272f"/>
      <path d="M48 78 q12 8 24 0" stroke="#2c323d" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M50 88 q10 6 20 0" stroke="#2c323d" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- face plate -->
      <ellipse cx="60" cy="56" rx="34" ry="30" fill="#22272f"/>
      <!-- eye sockets -->
      <circle cx="42" cy="54" r="15" fill="#161922"/>
      <circle cx="78" cy="54" r="15" fill="#161922"/>
      <!-- eyes group (scaled vertically for blink/close) -->
      <g class="owl-eye" id="eyeLeft">
        <circle cx="42" cy="54" r="11" fill="#e6e8eb"/>
        <circle class="owl-pupil" id="pupilLeft" cx="42" cy="54" r="5.5" fill="#4f8cff"/>
        <circle cx="40" cy="51" r="1.6" fill="#fff" opacity="0.9"/>
      </g>
      <g class="owl-eye" id="eyeRight">
        <circle cx="78" cy="54" r="11" fill="#e6e8eb"/>
        <circle class="owl-pupil" id="pupilRight" cx="78" cy="54" r="5.5" fill="#4f8cff"/>
        <circle cx="76" cy="51" r="1.6" fill="#fff" opacity="0.9"/>
      </g>
      <!-- eyelids for closing -->
      <rect class="owl-lid" id="lidLeft" x="31" y="43" width="22" height="22" rx="11" fill="#22272f" transform="scale(1,0)" style="transform-box: fill-box; transform-origin: 50% 0%;"/>
      <rect class="owl-lid" id="lidRight" x="67" y="43" width="22" height="22" rx="11" fill="#22272f" transform="scale(1,0)" style="transform-box: fill-box; transform-origin: 50% 0%;"/>
      <!-- beak -->
      <path d="M55 64 L65 64 L60 72 Z" fill="#e0a23b"/>
    </svg>
  </div>

  <div class="brand">
    <h1>Link Building Suite</h1>
    <p>Inventory &amp; Outreach Tracker</p>
  </div>

  <div class="panel">
    <div class="mode-toggle" id="modeToggle">
      <div class="toggle-pill"></div>
      <button type="button" id="tabLogin" class="active">Log In</button>
      <button type="button" id="tabSignup">Sign Up</button>
    </div>

    <!-- Login / Signup form -->
    <form id="authForm" class="form-view">
      <div class="field">
        <input type="email" id="f_email" placeholder=" " autocomplete="email" required>
        <label for="f_email">Email</label>
      </div>

      <div class="field">
        <div class="password-wrap">
          <input type="password" id="f_password" placeholder=" " autocomplete="current-password" required minlength="6">
          <label for="f_password">Password</label>
          <button type="button" class="pw-toggle-btn" id="pwToggleBtn" aria-label="Show password" tabindex="-1">
            <svg id="pwEyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="caps-warning" id="capsWarning">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01M10.3 3.86 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.86a2 2 0 0 0-3.4 0Z"/></svg>
          Caps Lock is on
        </div>
        <div class="strength-row hidden" id="strengthRow">
          <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
        <div class="strength-label hidden" id="strengthLabel"></div>
      </div>

      <div class="forgot-row" id="forgotRow">
        <button type="button" id="forgotBtn">Forgot password?</button>
      </div>

      <button type="submit" class="primary-action" id="submitBtn">
        <span class="btn-label">Log In</span>
        <span class="btn-spinner"><span class="spinner-ring"></span>Please wait</span>
        <span class="btn-check">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          Done
        </span>
      </button>
    </form>

    <!-- Reset password form -->
    <form id="resetForm" class="form-view hidden">
      <div class="field">
        <input type="email" id="r_email" placeholder=" " autocomplete="email" required>
        <label for="r_email">Email</label>
      </div>
      <button type="submit" class="primary-action" id="resetBtn">
        <span class="btn-label">Send Reset Link</span>
        <span class="btn-spinner"><span class="spinner-ring"></span>Please wait</span>
        <span class="btn-check">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          Sent
        </span>
      </button>
      <button type="button" class="forgot-row-back" id="backToLoginBtn" style="background:none;border:none;color:var(--text-dim);font-size:12px;cursor:pointer;margin-top:12px;width:100%;text-align:center;">
        ← Back to log in
      </button>
    </form>

    <div class="status-msg" id="statusMsg"></div>
  </div>

  <p class="footer-note">New accounts are created as members. All data stays private to your account unless an admin needs to review it.</p>
</div>

<script>
(function () {
  "use strict";

  // ---- Supabase project credentials ----
  // Replace these two values with your own project's URL and anon/public key.
  // Find them in: Supabase Dashboard -> Project Settings -> API.
  var SUPABASE_URL = "https://lenzwhtqsdpnvuipkydb.supabase.co";
  var SUPABASE_ANON_KEY = "sb_publishable_cvIbPuf0om5EWFBeDqolmQ_b8rtLvkT";

  var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  var mode = "login"; // "login" | "signup"
  var view = "auth"; // "auth" | "reset"
  var reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  var tabLogin = document.getElementById("tabLogin");
  var tabSignup = document.getElementById("tabSignup");
  var modeToggle = document.getElementById("modeToggle");
  var submitBtn = document.getElementById("submitBtn");
  var statusMsg = document.getElementById("statusMsg");
  var authForm = document.getElementById("authForm");
  var resetForm = document.getElementById("resetForm");
  var resetBtn = document.getElementById("resetBtn");
  var forgotBtn = document.getElementById("forgotBtn");
  var backToLoginBtn = document.getElementById("backToLoginBtn");
  var emailInput = document.getElementById("f_email");
  var passwordInput = document.getElementById("f_password");
  var pwToggleBtn = document.getElementById("pwToggleBtn");
  var pwEyeIcon = document.getElementById("pwEyeIcon");
  var capsWarning = document.getElementById("capsWarning");
  var strengthRow = document.getElementById("strengthRow");
  var strengthLabel = document.getElementById("strengthLabel");
  var strengthBars = strengthRow.querySelectorAll(".bar");

  // ---------------- Owl mascot behavior ----------------
  var pupilLeft = document.getElementById("pupilLeft");
  var pupilRight = document.getElementById("pupilRight");
  var lidLeft = document.getElementById("lidLeft");
  var lidRight = document.getElementById("lidRight");
  var eyeLeftG = document.getElementById("eyeLeft");
  var eyeRightG = document.getElementById("eyeRight");
  var owlState = "idle"; // idle | typingEmail | passwordFocus

  function setOwlLook(dx, dy) {
    pupilLeft.setAttribute("cx", 42 + dx);
    pupilLeft.setAttribute("cy", 54 + dy);
    pupilRight.setAttribute("cx", 78 + dx);
    pupilRight.setAttribute("cy", 54 + dy);
  }

  function closeOwlEyes() {
    lidLeft.style.transform = "scale(1,1)";
    lidRight.style.transform = "scale(1,1)";
  }

  function openOwlEyes() {
    lidLeft.style.transform = "scale(1,0)";
    lidRight.style.transform = "scale(1,0)";
  }

  openOwlEyes();

  // Natural blinking loop, paused while password field is focused (eyes closed)
  function scheduleBlink() {
    var delay = 2400 + Math.random() * 2600;
    setTimeout(function () {
      if (owlState !== "passwordFocus") {
        closeOwlEyes();
        setTimeout(function () {
          if (owlState !== "passwordFocus") openOwlEyes();
        }, 130);
      }
      scheduleBlink();
    }, delay);
  }
  if (!reducedMotion) scheduleBlink();

  emailInput.addEventListener("focus", function () {
    owlState = "typingEmail";
    setOwlLook(2.5, 1);
  });
  emailInput.addEventListener("input", function () {
    // glance toward where text is being typed
    var len = emailInput.value.length;
    var dx = Math.min(3, len * 0.15);
    setOwlLook(dx, 1);
  });
  emailInput.addEventListener("blur", function () {
    if (owlState === "typingEmail") {
      owlState = "idle";
      setOwlLook(0, 0);
    }
  });

  passwordInput.addEventListener("focus", function () {
    owlState = "passwordFocus";
    closeOwlEyes();
  });
  passwordInput.addEventListener("blur", function () {
    owlState = "idle";
    openOwlEyes();
    setOwlLook(0, 0);
  });

  // ---------------- Caps lock detection ----------------
  passwordInput.addEventListener("keyup", function (e) {
    var caps = e.getModifierState && e.getModifierState("CapsLock");
    capsWarning.classList.toggle("show", !!caps);
  });
  passwordInput.addEventListener("blur", function () {
    capsWarning.classList.remove("show");
  });

  // ---------------- Password strength ----------------
  function scorePassword(pw) {
    var score = 0;
    if (pw.length >= 6) score++;
    if (pw.length >= 10) score++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
    if (/\d/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    return Math.min(score, 4);
  }

  var strengthColors = ["var(--bad)", "var(--bad)", "var(--warn)", "var(--good)", "var(--good)"];
  var strengthLabels = ["Very weak", "Weak", "Okay", "Strong", "Very strong"];

  passwordInput.addEventListener("input", function () {
    if (mode !== "signup") return;
    var pw = passwordInput.value;
    if (!pw) {
      strengthRow.classList.add("hidden");
      strengthLabel.classList.add("hidden");
      return;
    }
    strengthRow.classList.remove("hidden");
    strengthLabel.classList.remove("hidden");
    var score = scorePassword(pw);
    strengthBars.forEach(function (bar, i) {
      bar.style.background = i <= score ? strengthColors[score] : "var(--border)";
    });
    strengthLabel.textContent = strengthLabels[score];
    strengthLabel.style.color = strengthColors[score];
  });

  // ---------------- Show / hide password ----------------
  var pwVisible = false;
  pwToggleBtn.addEventListener("click", function () {
    pwVisible = !pwVisible;
    passwordInput.type = pwVisible ? "text" : "password";
    pwToggleBtn.setAttribute("aria-label", pwVisible ? "Hide password" : "Show password");
    pwEyeIcon.innerHTML = pwVisible
      ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 19c-7 0-11-7-11-7a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/>';
  });

  // ---------------- Mode toggle (login/signup) ----------------
  function setMode(newMode) {
    mode = newMode;
    tabLogin.classList.toggle("active", mode === "login");
    tabSignup.classList.toggle("active", mode === "signup");
    modeToggle.classList.toggle("signup", mode === "signup");
    submitBtn.querySelector(".btn-label").textContent = mode === "login" ? "Log In" : "Create Account";
    passwordInput.setAttribute(
      "autocomplete",
      mode === "login" ? "current-password" : "new-password"
    );
    document.getElementById("forgotRow").style.display = mode === "login" ? "flex" : "none";
    if (mode === "login") {
      strengthRow.classList.add("hidden");
      strengthLabel.classList.add("hidden");
    }
    hideStatus();
  }

  tabLogin.addEventListener("click", function () { setMode("login"); });
  tabSignup.addEventListener("click", function () { setMode("signup"); });

  // ---------------- Forgot password view ----------------
  function showView(newView) {
    view = newView;
    if (view === "reset") {
      authForm.classList.add("hidden");
      resetForm.classList.remove("hidden");
    } else {
      resetForm.classList.add("hidden");
      authForm.classList.remove("hidden");
    }
    hideStatus();
  }

  forgotBtn.addEventListener("click", function () {
    document.getElementById("r_email").value = emailInput.value;
    showView("reset");
  });
  backToLoginBtn.addEventListener("click", function () {
    showView("auth");
  });

  // ---------------- Status messages ----------------
  function showStatus(msg, type) {
    statusMsg.textContent = msg;
    statusMsg.className = "status-msg show " + type;
  }

  function hideStatus() {
    statusMsg.className = "status-msg";
  }

  function setButtonLoading(btn, isLoading) {
    btn.disabled = isLoading;
    btn.classList.toggle("loading", isLoading);
  }

  function setButtonSuccess(btn) {
    btn.classList.remove("loading");
    btn.classList.add("success");
  }

  // If already logged in, skip straight to the app.
  async function checkExistingSession() {
    try {
      var sessionResult = await supabaseClient.auth.getSession();
      if (sessionResult.data && sessionResult.data.session) {
        window.location.href = "index.html";
      }
    } catch (e) {
      console.error("Session check failed", e);
    }
  }
  checkExistingSession();

  // ---------------- Inline validation ----------------
  function isValidEmail(v) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  }

  emailInput.addEventListener("blur", function () {
    var v = emailInput.value.trim();
    if (!v) { emailInput.classList.remove("valid", "invalid"); return; }
    emailInput.classList.toggle("valid", isValidEmail(v));
    emailInput.classList.toggle("invalid", !isValidEmail(v));
  });
  emailInput.addEventListener("input", function () {
    emailInput.classList.remove("invalid");
  });

  // ---------------- Submit: login / signup ----------------
  authForm.addEventListener("submit", async function (e) {
    e.preventDefault();
    hideStatus();

    var email = emailInput.value.trim();
    var password = passwordInput.value;

    if (!email || !password) {
      showStatus("Email and password are required.", "error");
      return;
    }
    if (!isValidEmail(email)) {
      showStatus("Please enter a valid email address.", "error");
      emailInput.classList.add("invalid");
      return;
    }

    setButtonLoading(submitBtn, true);

    try {
      if (mode === "signup") {
        var signUpResult = await supabaseClient.auth.signUp({
          email: email,
          password: password
        });
        if (signUpResult.error) {
          showStatus(signUpResult.error.message, "error");
          setButtonLoading(submitBtn, false);
          return;
        }

        // If email confirmation is required by your Supabase Auth settings,
        // there will be no active session yet — tell the user to confirm.
        if (signUpResult.data && signUpResult.data.session) {
          setButtonLoading(submitBtn, false);
          setButtonSuccess(submitBtn);
          showStatus("Account created. Redirecting...", "success");
          setTimeout(function () { window.location.href = "index.html"; }, 700);
        } else {
          setButtonLoading(submitBtn, false);
          showStatus("Account created. Check your email to confirm, then log in.", "success");
          setMode("login");
        }
      } else {
        var signInResult = await supabaseClient.auth.signInWithPassword({
          email: email,
          password: password
        });
        if (signInResult.error) {
          showStatus(signInResult.error.message, "error");
          setButtonLoading(submitBtn, false);
          return;
        }
        setButtonLoading(submitBtn, false);
        setButtonSuccess(submitBtn);
        showStatus("Logged in. Redirecting...", "success");
        setTimeout(function () { window.location.href = "index.html"; }, 400);
      }
    } catch (err) {
      console.error(err);
      showStatus("Something went wrong. Please try again.", "error");
      setButtonLoading(submitBtn, false);
    }
  });

  // ---------------- Submit: forgot password ----------------
  resetForm.addEventListener("submit", async function (e) {
    e.preventDefault();
    hideStatus();

    var email = document.getElementById("r_email").value.trim();
    if (!email || !isValidEmail(email)) {
      showStatus("Please enter a valid email address.", "error");
      return;
    }

    setButtonLoading(resetBtn, true);

    try {
      var redirectTo = window.location.origin + window.location.pathname.replace(/login\.html$/, "") + "reset-password.html";
      var result = await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: redirectTo
      });
      if (result.error) {
        showStatus(result.error.message, "error");
        setButtonLoading(resetBtn, false);
        return;
      }
      setButtonLoading(resetBtn, false);
      setButtonSuccess(resetBtn);
      showStatus("Reset link sent. Check your email.", "success");
    } catch (err) {
      console.error(err);
      showStatus("Something went wrong. Please try again.", "error");
      setButtonLoading(resetBtn, false);
    }
  });

})();
</script>
</body>
</html>
