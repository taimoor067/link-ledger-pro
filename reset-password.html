<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Link Building Suite</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0b0d12;
    --panel-solid: #161922;
    --panel-2: #1c2029;
    --border: #2a2f3a;
    --border-soft: rgba(255,255,255,0.06);
    --text: #e6e8eb;
    --text-dim: #9aa1ad;
    --text-faint: #686f7b;
    --accent: #4f8cff;
    --accent-2: #7da6ff;
    --good: #3ecf8e;
    --warn: #e0a23b;
    --bad: #e0563b;
    --radius: 14px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    position: relative;
    overflow-x: hidden;
  }

  .bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background: var(--bg);
  }

  .bg-glow {
    position: absolute;
    border-radius: 50%;
    opacity: 0.3;
    will-change: transform;
    transform: translateZ(0);
  }

  .bg-glow.one {
    width: 520px;
    height: 520px;
    top: -200px;
    left: -180px;
    background: radial-gradient(circle, var(--accent) 0%, rgba(79,140,255,0) 70%);
    animation: driftOne 26s ease-in-out infinite;
  }

  .bg-glow.two {
    width: 480px;
    height: 480px;
    bottom: -220px;
    right: -180px;
    background: radial-gradient(circle, #6f5cff 0%, rgba(111,92,255,0) 70%);
    animation: driftTwo 30s ease-in-out infinite;
  }

  @keyframes driftOne {
    0%, 100% { transform: translate3d(0, 0, 0); }
    50% { transform: translate3d(50px, 30px, 0); }
  }
  @keyframes driftTwo {
    0%, 100% { transform: translate3d(0, 0, 0); }
    50% { transform: translate3d(-40px, -25px, 0); }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }

  .auth-wrap {
    width: 100%;
    max-width: 380px;
    position: relative;
    z-index: 1;
    animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .brand {
    text-align: center;
    margin-bottom: 22px;
  }

  .brand h1 {
    font-size: 18px;
    margin: 0 0 4px 0;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .brand p {
    color: var(--text-dim);
    font-size: 12.5px;
    margin: 0;
  }

  .panel {
    background: linear-gradient(180deg, rgba(28,32,42,0.94), rgba(20,23,31,0.94));
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 26px 24px;
    position: relative;
    isolation: isolate;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.04) inset,
      0 20px 40px -16px rgba(0,0,0,0.5);
  }

  .panel::before {
    content: "";
    position: absolute;
    inset: -1px;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(135deg, rgba(79,140,255,0.35), rgba(255,255,255,0) 40%, rgba(79,140,255,0.12) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
    opacity: 0.7;
  }

  .panel-title {
    font-size: 15px;
    font-weight: 600;
    margin: 0 0 4px;
  }

  .panel-sub {
    font-size: 12.5px;
    color: var(--text-dim);
    margin: 0 0 20px;
  }

  .field {
    position: relative;
    margin-bottom: 16px;
  }

  .field input {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 16px 40px 8px 14px;
    border-radius: 8px;
    font-size: 14px;
    width: 100%;
    transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
  }

  .field input::placeholder { color: transparent; }

  .field label {
    position: absolute;
    left: 14px;
    top: 14px;
    font-size: 13.5px;
    color: var(--text-faint);
    pointer-events: none;
    transform-origin: left top;
    transition: transform 0.16s ease, color 0.16s ease, top 0.16s ease;
  }

  .field input:focus + label,
  .field input:not(:placeholder-shown) + label {
    top: 6px;
    transform: scale(0.78);
    color: var(--text-dim);
  }

  .field input:focus {
    outline: none;
    border-color: var(--accent);
    background: #1d2129;
    box-shadow: 0 0 0 3px rgba(79,140,255,0.14);
  }

  .field input.invalid { border-color: var(--bad); }
  .field input.valid { border-color: var(--good); }

  .password-wrap { position: relative; }

  .pw-toggle-btn {
    position: absolute;
    right: 10px;
    top: 13px;
    background: transparent;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color 0.15s ease;
  }

  .pw-toggle-btn:hover { color: var(--text-dim); }
  .pw-toggle-btn svg { width: 17px; height: 17px; }

  .strength-row {
    display: flex;
    gap: 4px;
    margin-top: 8px;
    height: 4px;
  }

  .strength-row .bar {
    flex: 1;
    border-radius: 3px;
    background: var(--border);
    transition: background 0.2s ease;
  }

  .strength-label {
    margin-top: 5px;
    font-size: 11px;
    color: var(--text-faint);
  }

  .field-hint {
    margin-top: 5px;
    font-size: 11.5px;
    color: var(--text-faint);
    min-height: 14px;
  }
  .field-hint.error { color: var(--bad); }

  button.primary-action {
    width: 100%;
    cursor: pointer;
    border: none;
    background: linear-gradient(135deg, var(--accent), #6f5cff);
    color: #fff;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    position: relative;
    overflow: hidden;
    transition: transform 0.12s ease, box-shadow 0.2s ease, opacity 0.15s ease;
    margin-top: 4px;
    box-shadow: 0 8px 24px -8px rgba(79,140,255,0.55);
  }

  button.primary-action:hover { box-shadow: 0 10px 28px -6px rgba(79,140,255,0.7); }
  button.primary-action:active { transform: scale(0.985); }
  button.primary-action:disabled { opacity: 0.75; cursor: default; }

  .btn-label, .btn-spinner, .btn-check {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-spinner, .btn-check { display: none; }
  button.primary-action.loading .btn-label { display: none; }
  button.primary-action.loading .btn-spinner { display: inline-flex; }
  button.primary-action.success .btn-label,
  button.primary-action.success .btn-spinner { display: none; }
  button.primary-action.success .btn-check { display: inline-flex; }
  button.primary-action.success { background: linear-gradient(135deg, var(--good), #2fae78); box-shadow: 0 8px 24px -8px rgba(62,207,142,0.55); }

  .spinner-ring {
    width: 15px;
    height: 15px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-msg {
    margin-top: 14px;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 12.5px;
    display: none;
    animation: fadeIn 0.2s ease both;
  }
  .status-msg.show { display: block; }
  .status-msg.error {
    background: rgba(224, 86, 59, 0.1);
    border: 1px solid var(--bad);
    color: var(--bad);
  }
  .status-msg.success {
    background: rgba(62, 207, 142, 0.1);
    border: 1px solid var(--good);
    color: var(--good);
  }

  .back-link {
    text-align: center;
    margin-top: 18px;
  }
  .back-link a {
    color: var(--text-dim);
    font-size: 12.5px;
    text-decoration: none;
  }
  .back-link a:hover { color: var(--accent-2); }

  .hidden { display: none !important; }

  @media (max-width: 420px) {
    .panel { padding: 22px 18px; }
  }
</style>
</head>
<body>

<div class="bg-canvas" aria-hidden="true">
  <div class="bg-glow one"></div>
  <div class="bg-glow two"></div>
</div>

<div class="auth-wrap">
  <div class="brand">
    <h1>Link Building Suite</h1>
    <p>Inventory &amp; Outreach Tracker</p>
  </div>

  <div class="panel">

    <!-- Shown once Supabase verifies the recovery link -->
    <div id="resetStage">
      <p class="panel-title">Set a new password</p>
      <p class="panel-sub">Choose a new password for your account.</p>

      <form id="newPasswordForm">
        <div class="field">
          <div class="password-wrap">
            <input type="password" id="n_password" placeholder=" " autocomplete="new-password" required minlength="6">
            <label for="n_password">New password</label>
            <button type="button" class="pw-toggle-btn" id="pwToggleBtn1" aria-label="Show password" tabindex="-1">
              <svg id="pwEyeIcon1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="strength-row hidden" id="strengthRow">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
          </div>
          <div class="strength-label hidden" id="strengthLabel"></div>
        </div>

        <div class="field">
          <div class="password-wrap">
            <input type="password" id="n_password2" placeholder=" " autocomplete="new-password" required minlength="6">
            <label for="n_password2">Confirm password</label>
            <button type="button" class="pw-toggle-btn" id="pwToggleBtn2" aria-label="Show password" tabindex="-1">
              <svg id="pwEyeIcon2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="field-hint" id="matchHint"></div>
        </div>

        <button type="submit" class="primary-action" id="submitBtn">
          <span class="btn-label">Update Password</span>
          <span class="btn-spinner"><span class="spinner-ring"></span>Please wait</span>
          <span class="btn-check">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Updated
          </span>
        </button>
      </form>

      <div class="status-msg" id="statusMsg"></div>
    </div>

    <!-- Shown if the link is missing/expired/invalid -->
    <div id="invalidStage" class="hidden">
      <p class="panel-title">This reset link isn't valid</p>
      <p class="panel-sub">It may have expired, or already been used. Request a new one from the login page.</p>
      <a href="login.html" style="display:block;">
        <button type="button" class="primary-action">Back to Log In</button>
      </a>
    </div>

  </div>

  <p class="back-link"><a href="login.html">← Back to log in</a></p>
</div>

<script>
(function () {
  "use strict";

  var SUPABASE_URL = "https://lenzwhtqsdpnvuipkydb.supabase.co";
  var SUPABASE_ANON_KEY = "sb_publishable_cvIbPuf0om5EWFBeDqolmQ_b8rtLvkT";

  var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  var resetStage = document.getElementById("resetStage");
  var invalidStage = document.getElementById("invalidStage");
  var newPasswordForm = document.getElementById("newPasswordForm");
  var submitBtn = document.getElementById("submitBtn");
  var statusMsg = document.getElementById("statusMsg");
  var password1 = document.getElementById("n_password");
  var password2 = document.getElementById("n_password2");
  var matchHint = document.getElementById("matchHint");
  var strengthRow = document.getElementById("strengthRow");
  var strengthLabel = document.getElementById("strengthLabel");
  var strengthBars = strengthRow.querySelectorAll(".bar");

  function showStatus(msg, type) {
    statusMsg.textContent = msg;
    statusMsg.className = "status-msg show " + type;
  }
  function hideStatus() {
    statusMsg.className = "status-msg";
  }

  function setButtonLoading(btn, isLoading) {
    btn.disabled = isLoading;
    btn.classList.toggle("loading", isLoading);
  }
  function setButtonSuccess(btn) {
    btn.classList.remove("loading");
    btn.classList.add("success");
  }

  // ---- Password strength ----
  function scorePassword(pw) {
    var score = 0;
    if (pw.length >= 6) score++;
    if (pw.length >= 10) score++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
    if (/\d/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    return Math.min(score, 4);
  }
  var strengthColors = ["var(--bad)", "var(--bad)", "var(--warn)", "var(--good)", "var(--good)"];
  var strengthLabels = ["Very weak", "Weak", "Okay", "Strong", "Very strong"];

  password1.addEventListener("input", function () {
    var pw = password1.value;
    if (!pw) {
      strengthRow.classList.add("hidden");
      strengthLabel.classList.add("hidden");
      return;
    }
    strengthRow.classList.remove("hidden");
    strengthLabel.classList.remove("hidden");
    var score = scorePassword(pw);
    strengthBars.forEach(function (bar, i) {
      bar.style.background = i <= score ? strengthColors[score] : "var(--border)";
    });
    strengthLabel.textContent = strengthLabels[score];
    strengthLabel.style.color = strengthColors[score];
    checkMatch();
  });

  function checkMatch() {
    if (!password2.value) {
      matchHint.textContent = "";
      matchHint.className = "field-hint";
      return;
    }
    if (password1.value === password2.value) {
      matchHint.textContent = "Passwords match";
      matchHint.className = "field-hint";
      matchHint.style.color = "var(--good)";
    } else {
      matchHint.textContent = "Passwords don't match";
      matchHint.className = "field-hint error";
    }
  }
  password2.addEventListener("input", checkMatch);

  // ---- Show/hide password toggles ----
  function wireToggle(btnId, iconId, input) {
    var btn = document.getElementById(btnId);
    var icon = document.getElementById(iconId);
    var visible = false;
    btn.addEventListener("click", function () {
      visible = !visible;
      input.type = visible ? "text" : "password";
      btn.setAttribute("aria-label", visible ? "Hide password" : "Show password");
      icon.innerHTML = visible
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 19c-7 0-11-7-11-7a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/>';
    });
  }
  wireToggle("pwToggleBtn1", "pwEyeIcon1", password1);
  wireToggle("pwToggleBtn2", "pwEyeIcon2", password2);

  // ---- Verify recovery session ----
  // Supabase sends the user here with a recovery token in the URL hash/query.
  // supabase-js automatically exchanges it for a session and fires PASSWORD_RECOVERY.
  var sessionReady = false;

  function showInvalid() {
    resetStage.classList.add("hidden");
    invalidStage.classList.remove("hidden");
  }

  supabaseClient.auth.onAuthStateChange(function (event, session) {
    if (event === "PASSWORD_RECOVERY" && session) {
      sessionReady = true;
    }
  });

  (async function init() {
    try {
      var sessionResult = await supabaseClient.auth.getSession();
      if (sessionResult.data && sessionResult.data.session) {
        sessionReady = true;
      }
      // Give onAuthStateChange a brief moment to fire for recovery links
      setTimeout(function () {
        if (!sessionReady) showInvalid();
      }, 1200);
    } catch (e) {
      console.error("Session check failed", e);
      showInvalid();
    }
  })();

  // ---- Submit new password ----
  newPasswordForm.addEventListener("submit", async function (e) {
    e.preventDefault();
    hideStatus();

    var pw1 = password1.value;
    var pw2 = password2.value;

    if (!pw1 || !pw2) {
      showStatus("Please fill out both fields.", "error");
      return;
    }
    if (pw1.length < 6) {
      showStatus("Password must be at least 6 characters.", "error");
      return;
    }
    if (pw1 !== pw2) {
      showStatus("Passwords don't match.", "error");
      return;
    }

    setButtonLoading(submitBtn, true);

    try {
      var result = await supabaseClient.auth.updateUser({ password: pw1 });
      if (result.error) {
        showStatus(result.error.message, "error");
        setButtonLoading(submitBtn, false);
        return;
      }
      setButtonLoading(submitBtn, false);
      setButtonSuccess(submitBtn);
      showStatus("Password updated. Redirecting to log in...", "success");
      await supabaseClient.auth.signOut();
      setTimeout(function () { window.location.href = "login.html"; }, 1200);
    } catch (err) {
      console.error(err);
      showStatus("Something went wrong. Please try again.", "error");
      setButtonLoading(submitBtn, false);
    }
  });

})();
</script>
</body>
</html>
